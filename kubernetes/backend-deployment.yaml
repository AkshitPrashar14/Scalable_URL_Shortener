apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend

          image: url-shortener-backend:latest

          imagePullPolicy: Never

          ports:
            - containerPort: 5000

          env:
            - name: PORT
              value: "5000"

            - name: DB_HOST
              value: mysql-service

            - name: DB_PORT
              value: "3306"

            - name: DB_USER
              value: devuser

            - name: DB_PASSWORD
              value: "1234"

            - name: DB_NAME
              value: url_shortener

            - name: REDIS_URL
              value: redis://redis-service:6379

            - name: BASE_URL
              value: "http://localhost:30000"